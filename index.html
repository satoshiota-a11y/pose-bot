<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI朝活ポーズ提案</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      background-color: #f2c12e;
      background-image:
        radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── ヘッダー ── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-brick {
      display: inline-flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stud {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,0.25);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      text-shadow: 3px 3px 0px #c0860a, 4px 4px 0px rgba(0,0,0,0.2);
    }

    header p {
      margin-top: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.08em;
    }

    /* ── カード ── */
    .card {
      background: #e3000b;
      border: 4px solid #1a1a1a;
      border-radius: 10px;
      box-shadow: 6px 6px 0px #1a1a1a;
      padding: 0;
      max-width: 440px;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    /* スタッド（上部） */
    .studs-row {
      background: #cc0009;
      border-bottom: 4px solid #1a1a1a;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .studs-row .stud {
      width: 22px;
      height: 22px;
      background: #cc0009;
      border: 3px solid rgba(0,0,0,0.3);
      box-shadow: inset 0 2px 3px rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    /* カード本体 */
    .card-body {
      padding: 32px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      min-height: 240px;
      justify-content: center;
    }

    .card .emoji {
      font-size: 3.5rem;
      filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3));
    }

    .card .pose-id {
      background: #f2c12e;
      border: 3px solid #1a1a1a;
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 0.75rem;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: 0.1em;
    }

    .card .pose-name {
      font-size: 1.8rem;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
      letter-spacing: 0.04em;
    }

    .card .how-to {
      background: #ffffff;
      border: 3px solid #1a1a1a;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.7;
      color: #1a1a1a;
      width: 100%;
      text-align: left;
    }

    .card .ai-memo {
      background: #f2c12e;
      border: 3px solid #1a1a1a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #1a1a1a;
      width: 100%;
      text-align: left;
      line-height: 1.7;
    }

    .card .placeholder {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      font-weight: 700;
    }

    /* ── ボタン ── */
    button {
      margin-top: 28px;
      padding: 16px 48px;
      font-size: 1.05rem;
      font-weight: 900;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      letter-spacing: 0.1em;
      border: 4px solid #1a1a1a;
      border-radius: 8px;
      background: #006db7;
      color: #ffffff;
      cursor: pointer;
      box-shadow: 5px 5px 0px #1a1a1a;
      transition: transform 0.1s, box-shadow 0.1s;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.3);
    }

    button:hover {
      background: #0080d6;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0px #1a1a1a;
    }

    /* ── アニメーション ── */
    .fade-in {
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── フッター ── */
    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-brick">
      <div class="stud" style="background:#e3000b"></div>
      <div class="stud" style="background:#006db7"></div>
      <div class="stud" style="background:#00a650"></div>
      <div class="stud" style="background:#e3000b"></div>
      <div class="stud" style="background:#006db7"></div>
    </div>
    <h1>🤖 AI朝活ポーズ提案</h1>
    <p>MORNING ACTIVITY POSE GENERATOR</p>
  </header>

  <div class="card" id="cardWrap">
    <div class="studs-row" id="studsRow">
      <div class="stud"></div>
      <div class="stud"></div>
      <div class="stud"></div>
      <div class="stud"></div>
      <div class="stud"></div>
      <div class="stud"></div>
    </div>
    <div class="card-body" id="card">
      <p class="placeholder">👇 ボタンを押してポーズを受け取ろう！</p>
    </div>
  </div>

  <button onclick="suggestPose()">🧱 ポーズを提案する！</button>

  <footer>30 POSES ／ AI MORNING ACTIVITY</footer>

  <script>
    const poses = [
      { id:1,  name:"ニューラルネットワーク", how:"隣の人と指先を軽く合わせ、網目状のネットワークを表現する。", memo:"つながりがAIの力。あなたも誰かのノードです。", emoji:"🔗" },
      { id:2,  name:"バイナリ（0と1）",       how:"片手で「0」を、もう片手で「1」を指で作る。",            memo:"すべてはゼロとイチから始まる。シンプルさが最強の言語。", emoji:"💻" },
      { id:3,  name:"ディープラーニング",      how:"顎に手を当て、深く考え込むようなポーズ。",              memo:"深く考えるほど、精度が上がる。あなたも今、学習中。", emoji:"🧠" },
      { id:4,  name:"クラウド・アップロード",  how:"両手を斜め上に掲げ、データを空へ送るような仕草。",      memo:"あなたの朝の気力をクラウドへ送信中…完了！", emoji:"☁️" },
      { id:5,  name:"AI CPU",                  how:"両手で顔の横に四角形（チップの形）を作る。",            memo:"あなたの脳はGPUより高速かもしれない。", emoji:"⚙️" },
      { id:6,  name:"ノートPC",                how:"腕をL字に曲げ、画面を開いたパソコンに見立てる。",      memo:"起動完了。今日もフル稼働でいきましょう！", emoji:"💡" },
      { id:7,  name:"高速 Wi-Fi",              how:"指を3本立てて、電波の感度マークを作る。",              memo:"感度フルバー。今日のあなたはつながりっぱなし。", emoji:"📶" },
      { id:8,  name:"ロボット・ダンス",        how:"肘を90度に固定し、カクカクとした機械的な姿勢。",       memo:"感情ゼロ、効率100%。でも笑顔は忘れずに。", emoji:"🤖" },
      { id:9,  name:"キーボード・タイピング",  how:"空中でピアノを弾くように指を動かし、入力を表現。",      memo:"打てば打つほど上達する。AIも人も同じ。", emoji:"⌨️" },
      { id:10, name:"マウス・クリック",        how:"人差し指を丸め、スイッチを押す瞬間の形。",             memo:"クリック一つで世界が変わる。今日もその一歩を。", emoji:"🖱️" },
      { id:11, name:"VRゴーグル",              how:"両手を目の周りに当てて、ゴーグルを覗いているポーズ。", memo:"新しい視点で見ると、世界はもっと広い。", emoji:"🥽" },
      { id:12, name:"コーディング（スラッシュ）",how:"腕を一本斜めにし、記号の「/」を表現する。",          memo:"コードの世界では斜線一本に意味がある。", emoji:"💻" },
      { id:13, name:"サンライズ",              how:"頭の上で両手で円を作り、朝の太陽を表現。",             memo:"新しい朝＝新しいエポック。今日も学習スタート！", emoji:"🌅" },
      { id:14, name:"コーヒーブレイク",        how:"マグカップを両手で包み込み、ふぅーっと一息つくポーズ。",memo:"休憩もチューニングのうち。AIだって冷却が必要。", emoji:"☕" },
      { id:15, name:"ステップアップ",          how:"階段を登るように、腕を互い違いに上下させる。",         memo:"一段ずつ。AIも最初は小さいモデルから始まった。", emoji:"🪜" },
      { id:16, name:"ひらめき電球",            how:"人差し指を一本ピンと立て、良いアイデアが出た表情。",   memo:"ひらめきはランダム性から生まれる。今日も期待！", emoji:"💡" },
      { id:17, name:"ロケット発射",            how:"両手を合わせて尖らせ、宇宙へ飛び立つ姿勢。",           memo:"推力さえあれば、どこへだって行ける。", emoji:"🚀" },
      { id:18, name:"ハート・ビット",          how:"指ハートを作り、AIへの愛を表現。",                     memo:"AIに愛をプログラムする時代がきました。", emoji:"💗" },
      { id:19, name:"シンクロニシティ",        how:"全員で同じ方向に首をかしげる。",                        memo:"チームが同期すると、出力は何倍にもなる。", emoji:"🔄" },
      { id:20, name:"ズーム・イン",            how:"両手でカメラのレンズを絞るような動作。",                memo:"細部を見ると、パターンが見えてくる。", emoji:"🔍" },
      { id:21, name:"スマートウォッチ",        how:"手首を指差し、時間を確認する仕草。",                    memo:"時間は有限。今この瞬間を最大化しよう。", emoji:"⌚" },
      { id:22, name:"アンテナ",                how:"片手を頭の上に立てて、情報を受信している様子。",         memo:"感度を上げれば、見えないシグナルも受け取れる。", emoji:"📡" },
      { id:23, name:"無限（∞）",              how:"両手で「8」を横にした形を作る。",                       memo:"学びに終わりはない。あなたの可能性も無限大。", emoji:"♾️" },
      { id:24, name:"データの海",              how:"手を水平にゆらゆらさせ、波を表現する。",                memo:"データの海を泳ぎ切れ。波に乗るのは今日から。", emoji:"🌊" },
      { id:25, name:"サイバー・サングラス",    how:"指でVサインを作り、目の横に添える。",                   memo:"未来を見る目をもった人が、次の時代を作る。", emoji:"😎" },
      { id:26, name:"スクロール",              how:"片手の人差し指を上下にシャッシャッと動かす。",          memo:"情報をスクロールするより、体を動かす朝活が最強。", emoji:"📜" },
      { id:27, name:"ピクセル",                how:"両手で小さな正方形を作り、画素を表現。",                memo:"小さな点の積み重ねが、大きな絵になる。", emoji:"🟦" },
      { id:28, name:"バグ・退治",              how:"両手で何かをパチンと叩くポーズ。",                      memo:"バグは早期発見が鉄則。今日の不安も叩き潰せ！", emoji:"🐛" },
      { id:29, name:"アップデート完了",        how:"両手で「OK」マークを作り、頬に当てる。",                memo:"昨日より今日。毎日アップデートし続ける自分へ。", emoji:"✅" },
      { id:30, name:"オール・グリーン",        how:"両腕で大きな丸を作り、システム正常を表現。",            memo:"全システム正常稼働。今日も最高のパフォーマンスを！", emoji:"🟢" },
    ];

    const colors = [
      { bg:'#e3000b', top:'#cc0009' },
      { bg:'#006db7', top:'#0058a0' },
      { bg:'#00a650', top:'#008f45' },
      { bg:'#6e3fa3', top:'#5c348a' },
      { bg:'#f47920', top:'#d6651a' },
    ];

    let lastId = -1;

    function suggestPose() {
      let idx;
      do { idx = Math.floor(Math.random() * poses.length); } while (idx === lastId);
      lastId = idx;
      const p = poses[idx];
      const col = colors[idx % colors.length];

      const wrap = document.getElementById('cardWrap');
      const studs = document.getElementById('studsRow');
      wrap.style.background = col.bg;
      wrap.style.borderColor = '#1a1a1a';
      studs.style.background = col.top;

      document.getElementById('card').innerHTML = `
        <div class="emoji fade-in">${p.emoji}</div>
        <div class="pose-id fade-in">No. ${String(p.id).padStart(2,'0')} ／ 30</div>
        <div class="pose-name fade-in">${p.name}</div>
        <div class="how-to fade-in">🙌 ${p.how}</div>
        <div class="ai-memo fade-in">🤖 ${p.memo}</div>
      `;
    }
  </script>
</body>
</html>
